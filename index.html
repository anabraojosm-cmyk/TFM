<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Casa-Museo Maravillas</title>

<style>
* { box-sizing:border-box; margin:0; padding:0; }
body {
  font-family:'Roboto',sans-serif;
  background:#061D39;
  color:#EBEBEB;
  height:100vh;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* CABECERA */
.top-bar {
  height:60px;
  background:#EBEBEB;
  color:#061D39;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:'Playfair Display',serif;
  font-size:28px;
  font-weight:700;
  position:relative;
}

.menu-button {
  position:absolute;
  right:25px;
  top:18px;
  cursor:pointer;
  display:flex;
  flex-direction:column;
  gap:5px;
}

.menu-line {
  width:22px;
  height:2px;
  background:#061D39;
}

/* MENU DESPLEGABLE */
.menu-panel {
  position:absolute;
  top:60px;
  right:20px;
  background:#EBEBEB;
  color:#061D39;
  border-radius:6px;
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
  padding:12px;
  display:none;
  flex-direction:column;
  gap:10px;
  font-size:14px;
  min-width:190px;
  z-index:1000;
}

.menu-panel.active {
  display: flex;
}

.menu-panel div {
  cursor: pointer;
  padding: 5px 8px;
  border-radius: 4px;
  transition: background 0.2s;
}

.menu-panel div:hover {
  background: #A2A2A2;
  color: white;
}
  
/* SALA */
.main {
  flex:1;
  background:#061D39;
  display:flex;
  min-height:0;
}
#threeCanvas {
  flex:1;
  width:100%;
  height:100%;
  display:block;
}

/* BARRA INFERIOR */
.bottom-bar {
  background:#EBEBEB;
  padding:18px 30px;
  display:flex;
  flex-direction:column;
  gap:12px;
}
.bottom-bar h2 {
  color:#061D39;
  font-size:20px;
}
.bottom-content {
  display:flex;
  align-items:center;
  gap:30px;
  flex-wrap: wrap;
}

.search-block { 
  display:flex; 
  gap:10px; 
}

.code-input {
  font-family: 'Fira Code', monospace;
  padding:10px;
  border:1px solid #A2A2A2;
  border-radius:8px;
  background:#EBEBEB;
  color:#061D39;
}

.button {
  padding:10px 16px;
  background:#8F95A5;
  color:#EBEBEB;
  border:none;
  border-radius:8px;
  cursor:pointer;
  transition:all 0.2s;
}

.button:hover { background:#061D39; }

/* VISOR */
.object-viewer {
  width:170px;
  height:120px;
  border:1px solid #A2A2A2;
  border-radius:6px;
  background:#061D39;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:11px;
  opacity:0.7;
}

/* DATOS */
.object-data {
  display:flex;
  gap:20px;
  flex-wrap: wrap;
  color:#061D39;
  font-size:14px;
}

/* FOOTER */
.footer {
  height:22px;
  background:#061D39;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:12px;
}
</style>
</head>

<body>
  <div id="viewer"></div>
<!-- CABECERA -->
<div class="top-bar">
  Casa-Museo Maravillas

  <div class="menu-button" id="menuButton">
    <div class="menu-line"></div>
    <div class="menu-line"></div>
    <div class="menu-line"></div>
  </div>

  <div class="menu-panel" id="menuPanel">
    <div>Visión de humedad relativa HR %</div>
    <div>Temperatura</div>
    <div>Piezas en riesgo</div>
    <div>Selección por tipología</div>
    <div>Gráficas</div>
    <div>Mapa Alerta</div>
  </div>
</div>

<!-- SALA -->
<div class="main">
  <canvas id="threeCanvas"></canvas>
</div>

<!-- BARRA INFERIOR -->
<div class="bottom-bar">
  <h2>Sala: Salón de Estudio</h2>

  <div class="bottom-content">
    <div class="search-block">
      <input class="code-input" placeholder="Introduce el código" id="codeInput">
      <button class="button" id="searchButton">Buscar</button>
    </div>

    <div class="object-viewer"
      >Visor 3D
    </div>

    <div class="object-data" id="objectInfo"></div>
  </div>
</div>

<div class="footer">
  © Ana Braojos Martorell
</div>

<!-- JS DIRECTO -->
<script>
console.log("JS cargado correctamente.");

// --- MENÚ HAMBURGUESA ---
const menuButton = document.getElementById("menuButton");
const menuPanel = document.getElementById("menuPanel");

menuButton.addEventListener("click", () => {
  // Alterna entre oculto / visible
  if (menuPanel.style.display === "flex") {
    menuPanel.style.display = "none";
  } else {
    menuPanel.style.display = "flex";
  }
});

// Cerrar menú al hacer clic fuera
document.addEventListener("click", function(e) {
  if (!menuButton.contains(e.target) && !menuPanel.contains(e.target)) {
    menuPanel.style.display = "none";
  }
});
</script>

<!-- Three.js + GLTFLoader -->
  <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
  <script src="https://unpkg.com/three@0.160.0/examples/js/loaders/GLTFLoader.js"></script>

  <script src="js/script.js"></script>
</body>
</html>
